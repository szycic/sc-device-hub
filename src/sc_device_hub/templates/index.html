<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Device Hub</title>
    <link rel="icon" href="/static/favicon.ico" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <div>
          <p class="eyebrow">FastAPI dashboard</p>
          <h1>Device Hub</h1>
          <p class="lede">
            Monitor reachability and wire Tuya outlets into a single dashboard.
          </p>
        </div>
        <div class="hero-stats">
          <div class="stat">
            <span class="stat-label">Devices</span>
            <strong id="device-count">{{ devices | length }}</strong>
          </div>
        </div>
      </section>

      <section class="grid">
        <article class="card panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Fleet status</p>
              <h2>Current devices</h2>
            </div>
            <button id="refresh-all" class="secondary" type="button">Refresh all</button>
          </div>
          <div id="message" class="message"></div>
          <div id="device-list" class="device-list"></div>
        </article>
      </section>
    </main>
    
    <template id="device-template">
      <section class="device-row">
        <div class="device-main">
          <div class="device-title-row">
            <h3 class="device-name"></h3>
            <span class="badge device-state"></span>
          </div>
          <p class="device-id"></p>
          <p class="device-meta"></p>
          <p class="device-note"></p>
        </div>
        <div class="device-actions">
          <button type="button" class="secondary refresh-action">Refresh</button>
          <button type="button" class="secondary ping-action">Ping</button>
          <button type="button" class="primary toggle-action">Toggle</button>
        </div>
      </section>
    </template>


    <script>
      const deviceList = document.getElementById('device-list');
      const deviceTemplate = document.getElementById('device-template');
      const message = document.getElementById('message');
      const deviceCount = document.getElementById('device-count');
      const refreshAllButton = document.getElementById('refresh-all');

      const stateLabels = {
        online: 'Online',
        offline: 'Offline',
        unknown: 'Unknown',
      };

      function showMessage(text, kind = 'info') {
        message.textContent = text;
        message.dataset.kind = kind;
      }

      function renderDevice(device) {
        const node = deviceTemplate.content.cloneNode(true);
        const row = node.querySelector('.device-row');
        const name = node.querySelector('.device-name');
        const id = node.querySelector('.device-id');
        const state = node.querySelector('.device-state');
        const meta = node.querySelector('.device-meta');
        const note = node.querySelector('.device-note');
        const refreshAction = node.querySelector('.refresh-action');
        const pingAction = node.querySelector('.ping-action');
        const toggleAction = node.querySelector('.toggle-action');

        name.textContent = device.name;
        id.textContent = device.id;
        state.textContent = stateLabels[device.state] || device.state;
        state.dataset.state = device.state;
        meta.textContent = [device.type.replace('_', ' '), device.ip_address ? `IP: ${device.ip_address}` : 'No IP configured'].join(' • ');
        note.textContent = device.last_message || device.last_action || 'No recent activity';

        pingAction.hidden = !device.ip_address;
        toggleAction.hidden = !device.can_toggle;

        pingAction.addEventListener('click', async () => {
          await performAction(`/api/v1/devices/${device.id}/ping`, `${device.name} pinged`);
        });

        refreshAction.addEventListener('click', async () => {
          await performAction(`/api/v1/devices/${device.id}/refresh`, `${device.name} status refreshed`);
        });

        if (device.can_toggle) {
          toggleAction.addEventListener('click', async () => {
            await performAction(`/api/v1/devices/${device.id}/toggle`, `${device.name} toggled`);
          });
        }

        row.dataset.deviceId = device.id;
        return node;
      }

      async function loadDevices() {
        const response = await fetch('/api/v1/devices');
        if (!response.ok) {
          throw new Error('Unable to load devices');
        }
        const devices = await response.json();
        deviceList.innerHTML = '';
        devices.forEach((device) => {
          deviceList.appendChild(renderDevice(device));
        });
        deviceCount.textContent = String(devices.length);
        return devices;
      }

      async function performAction(url, successMessage) {
        try {
          const response = await fetch(url, { method: 'POST' });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || 'Action failed');
          }
          showMessage(successMessage, 'success');
          await loadDevices();
        } catch (error) {
          showMessage(error.message, 'error');
        }
      }

      async function refreshAllDevices() {
        try {
          const devices = await loadDevices();
          await Promise.all(
            devices.map(async (device) => {
              if (device.ip_address) {
                await fetch(`/api/v1/devices/${device.id}/refresh`, { method: 'POST' });
              }
            }),
          );
          await loadDevices();
          showMessage('Refreshed reachable devices', 'success');
        } catch (error) {
          showMessage(error.message, 'error');
        }
      }

      refreshAllButton.addEventListener('click', async () => {
        await refreshAllDevices();
      });

      loadDevices().catch((error) => showMessage(error.message, 'error'));
      refreshAllDevices().catch((error) => showMessage(error.message, 'error'));
    </script>
  </body>
</html>
