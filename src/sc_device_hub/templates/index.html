<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Device Hub</title>
  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <main class="shell">
    <section class="hero card">
      <div>
        <p class="eyebrow">FastAPI dashboard</p>
        <h1>Device Hub</h1>
        <p class="lede">
          Monitor reachability and wire Tuya outlets into a single dashboard.
        </p>
      </div>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-label">Devices</span>
          <strong id="device-count">{{ devices | length }}</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Last global refresh</span>
          <strong id="last-refresh" class="stat-refresh">—</strong>
        </div>
      </div>
    </section>

    <section class="grid">
      <article class="card panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Fleet status</p>
            <h2>Current devices</h2>
          </div>
          <button id="refresh-all" class="secondary" type="button">Refresh all</button>
        </div>
        <div id="message" class="message"></div>
        <div id="device-list" class="device-list"></div>
      </article>
    </section>
  </main>

  <template id="device-template">
    <section class="device-row">
      <div class="device-main">
        <div class="device-title-row">
          <h3 class="device-name"></h3>
          <div class="device-badges">
            <span class="badge device-type-badge"></span>
            <span class="badge device-status"></span>
            <span class="badge device-state" hidden></span>
          </div>
        </div>
        <p class="device-id"></p>
        <p class="device-meta"></p>
        <p class="device-note"></p>
      </div>
      <div class="device-actions">
        <button type="button" class="secondary refresh-action">Refresh</button>
        <button type="button" class="secondary ping-action">Ping</button>
        <button type="button" class="primary toggle-action">Toggle</button>
      </div>
    </section>
  </template>

  <script src="/static/app.js" defer></script>
</body>

</html>
